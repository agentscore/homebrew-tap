version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 1
    commit-message:
      prefix: "chore(deps)"
    labels: ["dependencies", "ci"]
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    groups:
      actions:
        patterns: ["*"]
